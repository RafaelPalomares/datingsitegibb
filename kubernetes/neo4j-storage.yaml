apiVersion: v1
kind: PersistentVolume
metadata:
  name: neo4j-pv-0
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: muduo-local-storage
  hostPath:
    path: /data/muduo/neo4j-0
