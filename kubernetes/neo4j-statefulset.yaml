apiVersion: v1
kind: Service
metadata:
  name: neo4j-headless
  namespace: muduo
spec:
  clusterIP: None
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: browser
      port: 7474
      targetPort: 7474
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: muduo
spec:
  selector:
    app: neo4j
  ports:
    - name: bolt
      port: 7687
      targetPort: 7687
    - name: browser
      port: 7474
      targetPort: 7474
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: muduo
spec:
  serviceName: neo4j-headless
  replicas: 3
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
        - name: neo4j
          image: muduo/neo4j:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 7687
              name: bolt
            - containerPort: 7474
              name: browser
          env:
            - name: NEO4J_AUTH
              valueFrom:
                secretKeyRef:
                  name: muduo-secrets
                  key: neo4j-auth
            - name: NEO4J_server_memory_heap_initial__size
              value: "512m"
            - name: NEO4J_server_memory_heap_max__size
              value: "512m"
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: muduo-local-storage
        resources:
          requests:
            storage: 10Gi
